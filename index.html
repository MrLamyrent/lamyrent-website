<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lamyrent</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ---------------- RESET ---------------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"JetBrains Mono",monospace;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:#000;
overflow-x:hidden;
}

/* ---------------- ANIMATED BACKGROUND ---------------- */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(circle,#111 1px,transparent 1px);
background-size:40px 40px;
animation:bgmove 40s linear infinite;
opacity:.35;
z-index:-1;
}

@keyframes bgmove{
from{transform:translate(0,0);}
to{transform:translate(-200px,-200px);}
}

/* ---------------- CARD ---------------- */

.card{
width:420px;
backdrop-filter:blur(14px);
background:rgba(15,15,15,.75);
border:1px solid rgba(255,255,255,.08);
padding:35px;
border-radius:18px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,.8);
}

/* ---------------- AVATAR ---------------- */

.avatar{
width:95px;
height:95px;
border-radius:50%;
margin-bottom:15px;
border:2px solid white;
}

/* ---------------- TEXT ---------------- */

h1{
font-size:26px;
margin-bottom:6px;
}

.tag{
color:#aaa;
margin-bottom:18px;
font-size:14px;
}

.about{
font-size:14px;
color:#bbb;
margin-bottom:25px;
line-height:1.6;
}

/* ---------------- LINKS ---------------- */

.links a{
display:block;
margin:8px 0;
padding:11px;
text-decoration:none;
color:white;
border-radius:10px;
background:rgba(255,255,255,.05);
transition:.25s;
}

.links a:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.12);
box-shadow:0 0 15px rgba(255,255,255,.2);
}

/* ---------------- YOUTUBE ---------------- */

.section-title{
margin-top:28px;
margin-bottom:10px;
color:#aaa;
font-size:13px;
letter-spacing:1px;
}

iframe{
width:100%;
border-radius:12px;
border:none;
}

/* ---------------- MODRINTH CARD ---------------- */

.mod-card{
margin-top:15px;
padding:15px;
background:rgba(255,255,255,.05);
border-radius:12px;
transition:.25s;
}

.mod-card:hover{
background:rgba(255,255,255,.12);
transform:translateY(-3px);
}

.mod-card a{
color:white;
text-decoration:none;
font-weight:600;
}

.status{
margin-top:20px;
font-size:13px;
color:#777;
}

</style>
</head>

<body>

<div class="card">

<!-- ================= AVATAR ================= -->
<!-- ВСТАВЬ СЮДА СВОЮ АВАТАРКУ -->

</p>

</body>

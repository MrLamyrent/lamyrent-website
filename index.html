<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lamyrent</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "JetBrains Mono", monospace;
    min-height: 100vh;
    background: #000;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
}

/* particles background */
#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

/* card */
.card {
    position: relative;
    z-index: 2;
    backdrop-filter: blur(12px);
    background: rgba(15,15,15,0.75);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 30px;
    width: 420px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

/* avatar */
.avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin-bottom: 15px;
    border: 2px solid white;
}

/* text */
h1 {
    font-size: 26px;
    margin-bottom: 6px;
}

.tag {
    color: #aaa;
    margin-bottom: 15px;
}

/* links */
.links a {
    display: block;
    margin: 8px 0;
    padding: 10px;
    text-decoration: none;
    color: white;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    transition: 0.25s;
}

.links a:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.12);
}

/* status */
.status {
    margin-top: 15px;
    font-size: 13px;
    color: #888;
}

/* github section */
.github {
    margin-top: 20px;
}

.github img {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

</style>
</head>

<body>

<!-- PARTICLES BACKGROUND -->
<div id="particles"></div>

<div class="card">

<!-- AVATAR -->
<img class="avatar" src="assets/avatar.png" alt="avatar">

<h1>Lamyrent</h1>
<p class="tag">internet explorer • builder • gamer</p>

<div class="links">
    <a href="#">GitHub</a>
    <a href="#">Discord</a>
    <a href="#">Telegram</a>
    <a href="#">Steam</a>
</div>

<div class="github">
    <p style="color:#888; font-size:13px;">github activity</p>

    <!-- CONTRIBUTION GRAPH -->
    <img src="https://github-readme-activity-graph.vercel.app/graph?username=lamyrent&theme=github-dark&hide_border=true">
</div>

<p class="status">
currently online ⚡ building things
</p>

</div>

<!-- PARTICLES SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>
tsParticles.load("particles", {
  background: {
    color: "#000"
  },
  particles: {
    number: { value: 60 },
    color: { value: "#ffffff" },
    links: {
      enable: true,
      distance: 140,
      color: "#ffffff",
      opacity: 0.15
    },
    move: {
      enable: true,
      speed: 1
    },
    size: {
      value: 2
    },
    opacity: {
      value: 0.4
    }
  }
});
</script>

</body>
</html>

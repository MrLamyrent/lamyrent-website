<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lamyrent</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"JetBrains Mono",monospace;
background:black;
color:white;
overflow-x:hidden;
}

/* ================= MATRIX BACKGROUND ================= */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* ================= TERMINAL BOOT ================= */

#boot{
position:fixed;
width:100%;
height:100%;
background:black;
color:#00ff88;
padding:40px;
font-size:14px;
z-index:9999;
}

/* ================= MAIN CARD ================= */

.wrapper{
display:flex;
justify-content:center;
padding:60px 20px;
}

.card{
width:760px; /* +100% шире */
background:rgba(15,15,15,.75);
backdrop-filter:blur(12px);
border-radius:18px;
padding:40px;
box-shadow:0 0 40px rgba(0,0,0,.8);
}

/* ================= SECTIONS ================= */

.section{
margin-top:35px;
}

.section h2{
margin-bottom:12px;
color:#aaa;
font-size:15px;
}

/* ================= AVATAR ================= */

.avatar{
width:110px;
border-radius:50%;
margin-bottom:15px;
border:2px solid white;
}

/* ================= LINKS ================= */

.links a{
display:inline-block;
margin:5px;
padding:10px 14px;
text-decoration:none;
color:white;
background:#111;
border-radius:8px;
}

/* ================= CRT MODE ================= */

body.crt{
background:#001100;
color:#00ff88;
text-shadow:0 0 6px #00ff88;
}

body.crt .card{
background:rgba(0,20,0,.85);
border:1px solid #00ff88;
}

/* scanlines */

body.crt::after{
content:"";
position:fixed;
width:100%;
height:100%;
pointer-events:none;
background:repeating-linear-gradient(
to bottom,
transparent 0px,
transparent 2px,
rgba(0,0,0,.25) 3px
);
animation:flicker .15s infinite;
}

@keyframes flicker{
0%{opacity:.96;}
50%{opacity:1;}
100%{opacity:.95;}
}

.toggle{
position:fixed;
top:20px;
right:20px;
background:#111;
padding:10px;
cursor:pointer;
border-radius:8px;
}

/* ================= MOD CARD ================= */

.mod-card{
background:#111;
padding:15px;
border-radius:12px;
}

</style>
</head>

<body>

<!-- MATRIX BACKGROUND -->
<canvas id="matrix"></canvas>

<!-- BOOT SCREEN -->
<div id="boot">
<div id="boot-text"></div>
</div>

<!-- CRT TOGGLE -->
<div class="toggle" onclick="toggleCRT()">CRT</div>

<div class="wrapper">
<div class="card">

<!-- ================= ABOUT ================= -->

<img class="avatar" src="assets/avatar.png">

<h1 id="typing"></h1>

<div class="section">
<h2>About Me</h2>

<!-- ВСТАВЬ ОПИСАНИЕ -->
<p>
write your bio here.
builder • gamer • developer
</p>

</div>

<!-- ================= LINKS ================= -->

<div class="section links">
<a href="https://github.com/MrLamyrent">GitHub</a>
<a href="#">Discord</a>
<a href="#">Telegram</a>
<a href="#">Steam</a>
</div>

<!-- ================= DISCORD STATUS ================= -->

<div class="section">
<h2>Discord Status</h2>

<p id="discord-status">loading...</p>

</div>

<!-- ================= YOUTUBE ================= -->

<div class="section">
<h2>YouTube</h2>

<!-- ВСТАВЬ VIDEO ID -->
<iframe width="100%" height="350"
src="https://www.youtube.com/embed/b1aWgic5keM?si=PgFxD3uwzJG78Mas"
frameborder="0"
allowfullscreen></iframe>

</div>

<!-- ================= MODRINTH ================= -->

<div class="section">
<h2>My Mod (Modrinth)</h2>

<div id="modrinth" class="mod-card">
loading mod...
</div>

</div>

<!-- ================= VISITOR COUNTER ================= -->

<div class="section">
<h2>Visitors</h2>
<p id="visits">loading...</p>
</div>

</div>
</div>

<script>

/* ================= TYPING INTRO ================= */

const text="Initializing Lamyrent...";
let i=0;

function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,60);
}
}
type();

/* ================= TERMINAL BOOT ================= */

const bootLines=[
"Booting system...",
"Loading modules...",
"Connecting to network...",
"Authenticating user...",
"Welcome User."
];

let bootIndex=0;

function boot(){
if(bootIndex<bootLines.length){
document.getElementById("boot-text").innerHTML+=bootLines[bootIndex]+"<br>";
bootIndex++;
setTimeout(boot,600);
}else{
setTimeout(()=>{
document.getElementById("boot").style.display="none";
},800);
}
}
boot();

/* ================= MATRIX RAIN ================= */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let x=0;x<columns;x++)drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0f0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
const text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height&&Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}
setInterval(draw,33);

/* ================= CRT TOGGLE ================= */

function toggleCRT(){
document.body.classList.toggle("crt");
localStorage.setItem("crt",document.body.classList.contains("crt"));
}

if(localStorage.getItem("crt")==="true"){
document.body.classList.add("crt");
}

/* ================= DISCORD STATUS ================= */
/* ВСТАВЬ DISCORD USER ID */

fetch("https://api.lanyard.rest/v1/users/986947762132254732")
.then(r=>r.json())
.then(data=>{
const d=data.data;
document.getElementById("discord-status").innerText=
d.discord_status;
});

/* ================= VISITOR COUNTER ================= */

fetch("https://api.countapi.xyz/hit/lamyrent.qzz.io/visits")
.then(r=>r.json())
.then(data=>{
document.getElementById("visits").innerText=
data.value+" visits";
});

/* ================= MODRINTH API ================= */
/* ВСТАВЬ SLUG МОДА */

fetch("https://api.modrinth.com/v2/project/plugin/witherss")
.then(r=>r.json())
.then(mod=>{
document.getElementById("modrinth").innerHTML=`
<h3>${mod.title}</h3>
<p>${mod.description}</p>
<a href="https://modrinth.com/mod/${mod.slug}" target="_blank">
Open on Modrinth →
</a>
`;
});

</script>

</body>
</html>
